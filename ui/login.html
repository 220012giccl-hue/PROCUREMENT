<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Procurement</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #FF7A45 0%, #FF9800 100%);
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            background-image:
                radial-gradient(at 0% 0%, rgba(255, 122, 69, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 152, 0, 0.1) 0px, transparent 50%);
            overflow: hidden;
        }

        .login-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            position: relative;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            position: relative;
            z-index: 1;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 24px;
                border-radius: 16px;
            }
            .brand-name {
                font-size: 20px;
            }
        }

        .brand-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo {
            width: 56px;
            height: 56px;
            background: var(--primary-gradient);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            box-shadow: 0 10px 15px -3px rgba(255, 122, 69, 0.3);
            color: white;
        }

        .brand-name {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
        }

        .brand-tagline {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            width: 18px;
            height: 18px;
        }

        .login-input {
            width: 100%;
            padding: 12px 12px 12px 42px;
            background: #fbfbfb;
            border: 1.5px solid #edf2f7;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            transition: all 0.2s ease;
            color: var(--text-primary);
        }

        .login-input:focus {
            outline: none;
            border-color: var(--primary-orange);
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 122, 69, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 6px -1px rgba(255, 122, 69, 0.2);
            margin-top: 8px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(255, 122, 69, 0.3);
            filter: brightness(1.05);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .footer-links {
            text-align: center;
            margin-top: 32px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .footer-links a {
            color: var(--primary-orange);
            text-decoration: none;
            font-weight: 600;
            margin-left: 4px;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error-message {
            background: #fff5f5;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid #feb2b2;
            margin-bottom: 24px;
            display: none;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand-section">
                <div class="login-logo">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                </div>
                <h1 class="brand-name">Procurement Assistant</h1>
                <p class="brand-tagline">Login</p>
            </div>

            <div id="errorBox" class="error-message"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        <input type="text" id="username" class="login-input" placeholder="Enter your username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                            </path>
                        </svg>
                        <input type="password" id="password" class="login-input" placeholder="••••••••" required>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="btn-login">
                    <div id="submitSpinner" class="spinner"></div>
                    <span id="submitLabel">Sign In to Dashboard</span>
                </button>
            </form>

            <div class="footer-links">
                Forgot password? <a href="#">Contact Admin</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js?v=2.6"></script>
    <script src="js/api.js?v=2.6"></script>
    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const label = document.getElementById('submitLabel');
            const spinner = document.getElementById('submitSpinner');
            const errorBox = document.getElementById('errorBox');

            // AGGRESSIVE CACHE RESET: Wipe all old session data before trying to log in
            localStorage.clear();

            // Loading state
            btn.disabled = true;
            label.textContent = 'Authenticating...';
            spinner.style.display = 'block';
            errorBox.style.display = 'none';

            const formData = new FormData();
            formData.append('username', document.getElementById('username').value);
            formData.append('password', document.getElementById('password').value);

            try {
                const resp = await fetch(`${window.location.origin}/api/auth/login`, {
                    method: 'POST',
                    body: formData
                });
                const data = await resp.json();

                if (resp.ok) {
                    label.textContent = 'Identity Verified. Entering Portal...';
                    // Mark session as active in local cache (Not a token!)
                    localStorage.setItem('rfi_user_session', 'active');
                    window.location.href = data.redirect_url;
                } else {
                    throw new Error(data.detail || 'Access denied');
                }
            } catch (err) {
                errorBox.textContent = err.message || 'Connection failed';
                errorBox.style.display = 'block';
                btn.disabled = false;
                label.textContent = 'Sign In to Dashboard';
                spinner.style.display = 'none';
            }
        };
    </script>
</body>

</html>
