<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procurement List - Procurement Dashboard</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23FF5C35%22/><text y=%22.9em%22 font-size=%2280%22 x=%2250%25%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22serif%22 font-weight=%22bold%22>R</text></svg>">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">

    <style>
        .layout {
            min-height: 100vh;
            background: var(--bg-light);
        }

        .main-content {
            margin-left: 200px;
            margin-top: 64px;
            padding: var(--space-8);
        }

        .page-header {
            margin-bottom: var(--space-8);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-card {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .procurement-table {
            width: 100%;
            border-collapse: collapse;
        }

        .procurement-table th {
            text-align: left;
            padding: 16px 24px;
            background: #f8fafc;
            border-bottom: 2px solid #e2e8f0;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #64748b;
        }

        .procurement-table td {
            padding: 16px 24px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .item-name {
            font-weight: 600;
            color: var(--text-primary);
        }

        .item-specs {
            font-size: 0.75rem;
            color: var(--text-muted);
            max-width: 400px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-researching { background: #E0F2FE; color: #0369A1; }
        .status-rfq_sent { background: #DCFCE7; color: #15803D; }
        .status-draft { background: #FEF3C7; color: #92400E; }

        .btn-icon {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .btn-icon:hover {
            background: #f1f5f9;
            color: var(--primary-orange);
        }
        
        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <!-- Top Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <div class="nav-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary-orange)" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                <span>Procurement</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="badge badge-success">
                    <span class="status-indicator status-online"></span>
                    Online
                </span>
                <button onclick="Auth.logout()" class="btn btn-secondary btn-sm">Sign Out</button>
            </div>
        </div>
    </nav>

    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <!-- Populated via sidebar.js -->
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 style="font-size: 1.875rem; font-weight: 700; color: var(--text-primary);">Procurement List</h1>
                    <p style="color: var(--text-muted); margin-top: 4px;">Items saved from your AI research for future RFQs.</p>
                </div>
                <div style="display: flex; gap: 12px;">
                    <button class="btn btn-secondary" onclick="exportToCSV()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Export CSV
                    </button>
                    <button class="btn btn-primary" onclick="window.location.href='assistant.html?mode=procurement&new=1'">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:8px;"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        New Search
                    </button>
                </div>
            </div>

            <div class="list-card">
                <table class="procurement-table">
                    <thead>
                        <tr>
                            <th>Item Details</th>
                            <th>Supplier / Source</th>
                            <th>Status</th>
                            <th>Saved Date</th>
                            <th style="text-align: right;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="procurementListBody">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
                <div id="emptyState" class="empty-state" style="display:none;">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="margin-bottom:16px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    <p>No items in your procurement list yet.</p>
                    <button class="btn btn-secondary btn-sm" style="margin-top:16px;" onclick="window.location.href='assistant.html?mode=procurement&new=1'">Start Research</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            var u = await Auth.checkSession();
            if (!u) { window.location.href = "/"; }
        });
    </script>
    <script src="js/api.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        async function loadProcurementList() {
            const tbody = document.getElementById('procurementListBody');
            const emptyState = document.getElementById('emptyState');
            
            try {
                const response = await window.api.getProcurementList();
                const items = response.data || [];
                
                if (items.length === 0) {
                    tbody.innerHTML = '';
                    emptyState.style.display = 'block';
                    return;
                }
                
                emptyState.style.display = 'none';
                tbody.innerHTML = items.map(item => `
                    <tr>
                        <td>
                            <div class="item-info">
                                <span class="item-name">${item.item_name}</span>
                                <span class="item-specs" title="${item.technical_notes || ''}">${item.technical_notes || 'No specs recorded'}</span>
                            </div>
                        </td>
                        <td>
                            <div style="font-size: 0.85rem; font-weight: 500;">${item.supplier || 'N/A'}</div>
                            ${item.source_url ? `<a href="${item.source_url}" target="_blank" style="font-size: 0.7rem; color: var(--primary-orange); text-decoration: none;">View Source</a>` : ''}
                        </td>
                        <td>
                            <span class="status-badge status-${item.status.toLowerCase()}">${item.status}</span>
                        </td>
                        <td style="font-size: 0.85rem; color: #64748b;">
                            ${new Date(item.created_at).toLocaleDateString()}
                        </td>
                        <td style="text-align: right;">
                            <div style="display: flex; gap: 8px; justify-content: flex-end;">
                                <button class="btn-icon" title="Procurement Options" onclick="showChoiceModal('${encodeURIComponent(JSON.stringify(item))}')">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
                                </button>
                                <button class="btn-icon" title="Delete" onclick="deleteItem(${item.id})">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                                </button>
                            </div>
                        </td>
                    </tr>
                `).join('');
                
            } catch (err) {
                console.error("Error loading procurement list:", err);
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; color:red; padding:40px;">Error loading data. Please try again.</td></tr>';
            }
        }

        async function deleteItem(id) {
            if (!confirm("Are you sure you want to remove this item?")) return;
            
            try {
                const response = await window.api.deleteProcurementItem(id);
                if (response.success) {
                    loadProcurementList();
                } else {
                    alert("Failed to delete: " + response.detail);
                }
            } catch (err) {
                console.error("Delete error:", err);
                alert("Error deleting item.");
            }
        }

        async function exportToCSV() {
            try {
                const response = await window.api.getProcurementList();
                const items = response.data || [];
                
                if (items.length === 0) {
                    alert("No items to export.");
                    return;
                }

                const headers = ["Item Name", "Category", "Supplier", "Quantity", "Estimated Cost", "Status", "Date Saved"];
                const rows = items.map(i => [
                    `"${i.item_name}"`,
                    `"${i.category || ''}"`,
                    `"${i.supplier || 'N/A'}"`,
                    `"${i.quantity || ''}"`,
                    `"${i.estimated_cost || ''}"`,
                    `"${i.status}"`,
                    `"${new Date(i.created_at).toLocaleDateString()}"`
                ]);

                const csvContent = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `procurement_list_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (err) {
                console.error("Export error:", err);
                alert("Error exporting CSV.");
            }
        }

        let activeChoiceItem = null;

        function showChoiceModal(itemJsonStr) {
            try {
                const item = JSON.parse(decodeURIComponent(itemJsonStr));
                activeChoiceItem = item;
                document.getElementById('choiceItemName').textContent = item.item_name;
                document.getElementById('choiceModal').style.display = 'flex';
            } catch (e) {
                console.error("Error opening choice modal:", e);
            }
        }

        function closeChoiceModal() {
            document.getElementById('choiceModal').style.display = 'none';
            activeChoiceItem = null;
        }

        async function handleViewResearch() {
            if (!activeChoiceItem) return;
            const itemName = activeChoiceItem.item_name;
            try {
                // Show a loading state inside button
                const origBtn = document.querySelector('#choiceModal .btn-secondary');
                const titleEl = origBtn.querySelector('strong');
                const descEl = origBtn.querySelector('span');
                const origTitle = titleEl.textContent;
                
                titleEl.textContent = "Locating conversation...";
                descEl.textContent = "Searching through saved AI chat history...";
                origBtn.disabled = true;

                const res = await window.api.locateThreadByItem(itemName);
                
                if (res.success && res.conversation_id) {
                    // Set currentMode and currentConversationId to localStorage
                    localStorage.setItem('assistant_mode', res.mode || 'procurement');
                    localStorage.setItem('assistant_conv_id_' + (res.mode || 'procurement'), res.conversation_id);
                    
                    // Redirect to assistant.html
                    window.location.href = 'assistant.html';
                } else {
                    alert("No matching Procurement Assistant conversation found for this item name. Redirecting to assistant tab instead.");
                    window.location.href = 'assistant.html?mode=procurement&new=1';
                }
            } catch (err) {
                console.error("Error locating research thread:", err);
                window.location.href = 'assistant.html?mode=procurement&new=1';
            }
        }

        function handleGenerateRFQ() {
            if (!activeChoiceItem) return;
            // Redirect to assistant page with rfq action parameter, which will auto pre-fill and trigger modal
            window.location.href = `assistant.html?mode=procurement&action=rfq&id=${activeChoiceItem.id}`;
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadProcurementList();
            
            // Close choice modal on backdrop click
            const modal = document.getElementById('choiceModal');
            if (modal) {
                modal.addEventListener('click', function(e) {
                    if (e.target === this) closeChoiceModal();
                });
            }
        });
    </script>

    <!-- 🌟 Choice Selector Modal -->
    <div id="choiceModal" class="modal-overlay" style="display: none; align-items: center; justify-content: center; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px); z-index: 9999;">
        <div class="modal-container" style="max-width: 480px; width: 90%; padding: 24px; border-radius: 16px; background: white; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); border: 1px solid var(--border-light);">
            <div class="modal-header" style="display: flex; justify-content: space-between; align-items: center; padding-bottom: 12px; margin-bottom: 20px; border-bottom: 1px solid var(--border-light);">
                <h3 style="display: flex; align-items: center; gap: 10px; color: var(--text-primary); font-size: 1.15rem; font-weight: 600; margin: 0;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--primary-orange)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 16v-4"></path>
                        <path d="M12 8h.01"></path>
                    </svg>
                    Procurement Options
                </h3>
                <button class="modal-close" onclick="closeChoiceModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #94a3b8; transition: color 0.15s; line-height: 1;" onmouseover="this.style.color='#475569'" onmouseout="this.style.color='#94a3b8'">&times;</button>
            </div>
            <div class="modal-body" style="display: flex; flex-direction: column; gap: 16px;">
                <p style="font-size: 0.88rem; color: var(--text-muted); margin: 0 0 4px 0; line-height: 1.5;">
                    Please select an action for <strong id="choiceItemName" style="color: var(--text-primary); font-weight: 600;">Item</strong>:
                </p>
                
                <!-- Option 1: View Saved Research Chat -->
                <button onclick="handleViewResearch()" class="btn btn-secondary" style="display: flex; align-items: center; gap: 12px; padding: 16px; text-align: left; background: white; border: 1px solid var(--border-light); justify-content: flex-start; height: auto; border-radius: 12px; transition: all 0.2s; cursor: pointer;" onmouseover="this.style.borderColor='var(--primary-orange)'; this.style.background='rgba(255, 92, 53, 0.02)';" onmouseout="this.style.borderColor='var(--border-light)'; this.style.background='white';">
                    <div style="background: rgba(255, 92, 53, 0.1); padding: 10px; border-radius: 10px; color: var(--primary-orange); display: flex; flex-shrink: 0;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </div>
                    <div style="flex-grow: 1;">
                        <strong style="display: block; font-size: 0.92rem; color: var(--text-primary); margin-bottom: 3px;">View Saved Research</strong>
                        <span style="font-size: 0.76rem; color: var(--text-muted); font-weight: normal; line-height: 1.3; display: block;">Open the exact Procurement Assistant chat where this item was found.</span>
                    </div>
                </button>

                <!-- Option 2: Generate RFQ -->
                <button onclick="handleGenerateRFQ()" class="btn btn-primary" style="display: flex; align-items: center; gap: 12px; padding: 16px; text-align: left; justify-content: flex-start; height: auto; border-radius: 12px; background: var(--primary-orange); border: 1px solid transparent; transition: all 0.2s; cursor: pointer;" onmouseover="this.style.background='#e04822';" onmouseout="this.style.background='var(--primary-orange)';">
                    <div style="background: rgba(255, 255, 255, 0.2); padding: 10px; border-radius: 10px; color: white; display: flex; flex-shrink: 0;">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                        </svg>
                    </div>
                    <div style="flex-grow: 1;">
                        <strong style="display: block; font-size: 0.92rem; color: white; margin-bottom: 3px;">Generate RFQ</strong>
                        <span style="font-size: 0.76rem; color: rgba(255, 255, 255, 0.85); font-weight: normal; line-height: 1.3; display: block;">Open pre-filled RFQ Modal with supplier & specs auto-loaded.</span>
                    </div>
                </button>
            </div>
        </div>
    </div>
</body>
</html>
