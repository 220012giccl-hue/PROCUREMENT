<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suppliers - Procurement Dashboard</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%23FF5C35%22/><text y=%22.9em%22 font-size=%2280%22 x=%2250%25%22 text-anchor=%22middle%22 fill=%22white%22 font-family=%22serif%22 font-weight=%22bold%22>R</text></svg>">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">

    <style>
        .layout {
            min-height: 100vh;
            background: var(--bg-light);
        }

        .main-content {
            margin-left: 200px;
            margin-top: 64px;
            padding: var(--space-8);
        }

        .page-header {
            margin-bottom: var(--space-8);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* Professional Category Card */
        .category-card {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            margin-bottom: var(--space-8);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }

        .category-header {
            background: #f8fafc;
            padding: var(--space-4) var(--space-6);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .category-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1.1rem;
            text-transform: capitalize;
        }

        .category-icon {
            width: 28px;
            height: 28px;
            background: var(--primary-orange);
            color: white;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .vendor-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            background: white;
            padding: 2px 10px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
        }

        /* Professional List View */
        .vendor-table {
            width: 100%;
            border-collapse: collapse;
        }

        .vendor-row {
            border-bottom: 1px solid #f1f5f9;
            transition: background 0.2s;
        }

        .vendor-row:last-child {
            border-bottom: none;
        }

        .vendor-row:hover {
            background: #fdf2f0;
        }

        .vendor-cell {
            padding: var(--space-4) var(--space-6);
            vertical-align: middle;
        }

        .vendor-name-cell {
            font-weight: 600;
            color: var(--text-primary);
            width: 30%;
        }

        .vendor-contact-cell {
            font-size: 0.85rem;
            color: var(--text-secondary);
            width: 40%;
        }

        .vendor-location-cell {
            font-size: 0.85rem;
            color: var(--text-muted);
            width: 20%;
        }

        .vendor-action-cell {
            width: 10%;
            text-align: right;
        }

        .btn-icon {
            color: var(--text-muted);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            background: transparent;
        }

        .btn-icon:hover {
            background: white;
            color: var(--primary-orange);
            box-shadow: var(--shadow-sm);
        }

        .btn-icon-danger:hover {
            color: #dc2626;
        }

        .contact-info {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .contact-info svg {
            width: 14px;
            height: 14px;
            color: var(--text-muted);
        }

        /* Modal & Header Styles */
        .btn-add-supplier {
            background: var(--primary-orange);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(255, 92, 53, 0.2);
            transition: all 0.2s;
        }

        .btn-add-supplier:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(255, 92, 53, 0.3);
        }

        .btn-secondary {
            background: white;
            color: #334155;
            border: 1px solid #e2e8f0;
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary:hover {
            color: var(--primary-orange);
            border-color: #fed7cc;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .modal-content {
            background: white;
            width: 500px;
            max-height: calc(100vh - 48px);
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
        }

        .category-modal-content {
            width: 560px;
            overflow: hidden;
        }

        .form-group { margin-bottom: 16px; }
        .form-label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; color: #334155; }
        .form-input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-family: inherit; background: white; }
        .form-input:focus { border-color: var(--primary-orange); outline: none; box-shadow: 0 0 0 3px rgba(255, 92, 53, 0.1); }
        .btn-submit { background: var(--primary-orange); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 10px; }
        .form-help { color: #64748b; font-size: 0.8rem; margin-top: 6px; }
        .category-manager-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f1f5f9;
            font-weight: 600;
            color: #334155;
        }
        .category-manager-row:last-child { border-bottom: none; }
        .category-add-row { display: flex; gap: 10px; margin-bottom: 16px; }
        .category-add-row .form-input { flex: 1; }
        .category-add-row .btn-submit { width: auto; margin-top: 0; padding: 12px 16px; }
        .category-manager-list {
            overflow-y: auto;
            max-height: min(58vh, 520px);
            padding-right: 8px;
            overscroll-behavior: contain;
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary-orange)"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <span>Procurement</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Dashboard</a></li>
                <li><a href="calendar.html" class="nav-link">Calendar</a></li>
                <li><a href="threads.html" class="nav-link">Threads</a></li>
                <li><a href="settings.html" class="nav-link">Settings</a></li>
            </ul>
        </div>
    </nav>

    <div class="layout">
        <!-- Sidebar -->
                <aside class="sidebar">
            <!-- Sidebar content is unified via js/sidebar.js -->
            <ul class="sidebar-menu">
                <li class="sidebar-item"><a href="index.html" class="sidebar-link">Loading...</a></li>
            </ul>
        </aside>


        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 class="page-title" style="font-size: 1.75rem; font-weight: 800; color: #0f172a;">Supplier Directory</h1>
                    <p class="page-subtitle" style="color: #64748b;">Manage vendors and category classifications.</p>
                </div>
                <div class="page-actions">
                    <button class="btn-add-supplier btn-secondary" onclick="openCategoryModal()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7h16"></path><path d="M4 12h10"></path><path d="M4 17h7"></path><path d="M18 14v6"></path><path d="M15 17h6"></path></svg>
                        Categories
                    </button>
                    <button class="btn-add-supplier" onclick="openSupplierModal()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        New Vendor
                    </button>
                </div>
            </div>

            <div id="categoryList">
                <!-- Grouped categories will be rendered here -->
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="supplierModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 id="modalTitle" style="margin: 0; font-weight: 800; color: #0f172a;">Add Vendor</h2>
                <span onclick="closeSupplierModal()" style="cursor: pointer; color: #94a3b8; font-size: 24px;">&times;</span>
            </div>
            <form id="supplierForm">
                <input type="hidden" id="supplierId">
                <div class="form-group">
                    <label class="form-label">Vendor Name</label>
                    <input type="text" id="supplierName" class="form-input" required placeholder="Enter company name">
                </div>
                <div class="form-group">
                    <label class="form-label">Category</label>
                    <select id="supplierCategorySelect" class="form-input" onchange="toggleNewCategory()" required>
                        <option value="">-- Select Category --</option>
                        <option value="_NEW_">+ Add New Category</option>
                    </select>
                    <input type="text" id="supplierCategories" class="form-input" style="display: none; margin-top: 8px;" placeholder="Enter new category (e.g. Plumbing)">
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="supplierEmail" class="form-input" placeholder="vendor@example.com">
                </div>
                <div class="form-group">
                    <label class="form-label">Office Location</label>
                    <input type="text" id="supplierLocation" class="form-input" placeholder="City, State">
                </div>
                <button type="submit" class="btn-submit">Save Vendor Information</button>
            </form>
        </div>
    </div>

    <div id="categoryModal" class="modal">
        <div class="modal-content category-modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 style="margin: 0; font-weight: 800; color: #0f172a;">Manage Categories</h2>
                <span onclick="closeCategoryModal()" style="cursor: pointer; color: #94a3b8; font-size: 24px;">&times;</span>
            </div>
            <div class="category-add-row">
                <input type="text" id="categoryNameInput" class="form-input" placeholder="Plumber, Electrician, Builder">
                <button type="button" class="btn-submit" onclick="addCategoryFromManager()">Add</button>
            </div>
            <div id="categoryManagerList" class="category-manager-list"></div>
        </div>
    </div>

    <script src="js/sidebar.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            var u = await Auth.checkSession();
            if (!u) { window.location.href = "/"; }
        });
    </script>
    <script src="js/api.js"></script>
    <script>
        let globalCategories = new Set();
        let suppliers = [];
        let customCategories = JSON.parse(localStorage.getItem('supplierCategories') || '[]');
        let deletedCategories = JSON.parse(localStorage.getItem('deletedSupplierCategories') || '[]');
        const DEFAULT_CATEGORIES = ['Plumber', 'Electrician', 'Builder', 'Building Materials', 'Hardware', 'Tools', 'Safety', 'Welding', 'Other'];
        const FALLBACK_CATEGORY = 'Other';

        document.addEventListener('DOMContentLoaded', async () => {
            await loadSuppliers();
            document.getElementById('supplierForm').addEventListener('submit', handleSupplierSubmit);
        });

        function escapeHtml(value) {
            return String(value || '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function titleCase(value) {
            return String(value || '').trim().replace(/\w\S*/g, word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase());
        }

        function getSupplierCategories(supplier) {
            const raw = supplier && supplier.categories ? supplier.categories : 'Other';
            return raw.split(',').map(s => s.trim()).filter(Boolean);
        }

        async function loadSuppliers() {
            try {
                suppliers = await window.api.getSuppliers();
                const mainContainer = document.getElementById('categoryList');
                mainContainer.innerHTML = '';

                if (!suppliers || suppliers.length === 0) {
                    mainContainer.innerHTML = '<div style="text-align: center; padding: 60px; color: #94a3b8;">No vendors found. Click "New Vendor" to get started.</div>';
                    globalCategories.clear();
                    updateCategoryDropdown();
                    return;
                }

                globalCategories.clear();
                const groups = {};
                suppliers.forEach(s => {
                    const cats = getSupplierCategories(s);
                    cats.forEach(cat => {
                        const label = titleCase(cat);
                        if (!groups[label]) groups[label] = [];
                        groups[label].push(s);
                        globalCategories.add(label);
                    });
                });
                
                updateCategoryDropdown();

                Object.keys(groups).sort((a, b) => a.localeCompare(b)).forEach(catName => {
                    const vendors = groups[catName];
                    const card = document.createElement('div');
                    card.className = 'category-card';
                    card.innerHTML = `
                        <div class="category-header">
                            <div class="category-title">
                                <div class="category-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg></div>
                                ${escapeHtml(catName)}
                                <span class="vendor-count">${vendors.length}</span>
                            </div>
                        </div>
                        <table class="vendor-table">
                            <tbody>
                                ${vendors.map(v => `
                                    <tr class="vendor-row">
                                        <td class="vendor-cell vendor-name-cell">${escapeHtml(v.name)}</td>
                                        <td class="vendor-cell vendor-contact-cell">
                                            <div class="contact-info">
                                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path></svg>
                                                ${escapeHtml(v.email || 'N/A')}
                                            </div>
                                        </td>
                                        <td class="vendor-cell vendor-location-cell">${escapeHtml(v.location || 'N/A')}</td>
                                        <td class="vendor-cell vendor-action-cell" style="white-space: nowrap;">
                                            <button type="button" class="btn-icon" title="Edit" onclick="editSupplier(${JSON.stringify(v).replace(/"/g, '&quot;')})">
                                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                                            </button>
                                            <button type="button" class="btn-icon btn-icon-danger" title="Delete" onclick="deleteSupplier(${v.id})">
                                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>
                                            </button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    `;
                    mainContainer.appendChild(card);
                });

            } catch (err) {
                console.error('Failed to load directory:', err);
            }
        }

        function updateCategoryDropdown() {
            const select = document.getElementById('supplierCategorySelect');
            const currentVal = select.value;
            select.innerHTML = '<option value="">-- Select Category --</option>';
            const allCats = new Set([...DEFAULT_CATEGORIES, ...customCategories, ...Array.from(globalCategories)]);
            Array.from(allCats).sort().forEach(c => {
                select.innerHTML += `<option value="${c}">${c}</option>`;
            });
            select.innerHTML += '<option value="_NEW_">+ Add New Category</option>';
            if (currentVal) select.value = currentVal;
        }

        function toggleNewCategory() {
            const select = document.getElementById('supplierCategorySelect');
            const input = document.getElementById('supplierCategories');
            if (select.value === '_NEW_') {
                input.style.display = 'block';
                input.required = true;
            } else {
                input.style.display = 'none';
                input.required = false;
            }
        }

        function openSupplierModal() {
            document.getElementById('modalTitle').innerText = 'Add Vendor';
            document.getElementById('supplierId').value = '';
            document.getElementById('supplierForm').reset();
            updateCategoryDropdown();
            toggleNewCategory();
            document.getElementById('supplierModal').style.display = 'flex';
        }

        function closeSupplierModal() {
            document.getElementById('supplierModal').style.display = 'none';
        }

        function editSupplier(s) {
            document.getElementById('modalTitle').innerText = 'Edit Vendor';
            document.getElementById('supplierId').value = s.id;
            document.getElementById('supplierName').value = s.name;
            
            let cat = getSupplierCategories(s)[0] || 'Other';
            updateCategoryDropdown();
            
            const select = document.getElementById('supplierCategorySelect');
            if ([...select.options].some(o => o.value === cat)) {
                select.value = cat;
            } else {
                select.value = '_NEW_';
                document.getElementById('supplierCategories').value = cat;
            }
            toggleNewCategory();
            
            document.getElementById('supplierEmail').value = s.email || '';
            document.getElementById('supplierLocation').value = s.location || '';
            document.getElementById('supplierModal').style.display = 'flex';
        }

        async function deleteSupplier(id) {
            if (!confirm('Are you sure you want to delete this vendor?')) return;
            try {
                await window.api.deleteSupplier(id);
                await loadSuppliers();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        async function handleSupplierSubmit(e) {
            e.preventDefault();
            const id = document.getElementById('supplierId').value;
            
            let catVal = document.getElementById('supplierCategorySelect').value;
            if (catVal === '_NEW_') {
                catVal = document.getElementById('supplierCategories').value;
            }

            const data = {
                name: document.getElementById('supplierName').value,
                categories: catVal,
                email: document.getElementById('supplierEmail').value,
                location: document.getElementById('supplierLocation').value
            };

            try {
                if (id) await window.api.updateSupplier(id, data);
                else await window.api.addSupplier(data);
                closeSupplierModal();
                await loadSuppliers();
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        function saveCustomCategories() {
            localStorage.setItem('supplierCategories', JSON.stringify(customCategories));
        }

        function saveDeletedCategories() {
            deletedCategories = [...new Set(deletedCategories.map(titleCase).filter(Boolean))];
            localStorage.setItem('deletedSupplierCategories', JSON.stringify(deletedCategories));
        }

        function getAllCategories() {
            const allCats = new Set([...DEFAULT_CATEGORIES, ...customCategories, ...Array.from(globalCategories)]);
            return Array.from(allCats).sort();
        }

        function openCategoryModal() {
            renderCategoryManager();
            document.getElementById('categoryModal').style.display = 'flex';
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').style.display = 'none';
        }

        function renderCategoryManager() {
            const list = document.getElementById('categoryManagerList');
            const usedCategories = new Set();
            suppliers.forEach(s => getSupplierCategories(s).forEach(category => usedCategories.add(titleCase(category).toLowerCase())));
            list.innerHTML = getAllCategories().map(category => {
                const isUsed = usedCategories.has(category.toLowerCase());
                const statusLabel = isUsed ? 'In use' : 'Available';
                return `
                    <div class="category-manager-row">
                        <span>${escapeHtml(category)}</span>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            <span class="form-help">${statusLabel}</span>
                            <button type="button" class="btn-icon btn-icon-danger" title="Delete category" onclick="deleteCategory('${encodeURIComponent(category)}')">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addCategoryFromManager() {
            const input = document.getElementById('categoryNameInput');
            const category = titleCase(input.value);
            if (!category) return;
            if (!getAllCategories().some(item => item.toLowerCase() === category.toLowerCase())) {
                customCategories.push(category);
                deletedCategories = deletedCategories.filter(item => item.toLowerCase() !== category.toLowerCase());
                saveDeletedCategories();
                saveCustomCategories();
            }
            input.value = '';
            renderCategoryManager();
        }

        async function deleteCategory(category) {
            category = decodeURIComponent(category);
            const replacementCategory = category.toLowerCase() === FALLBACK_CATEGORY.toLowerCase()
                ? 'Uncategorized'
                : FALLBACK_CATEGORY;

            const affectedSuppliers = suppliers.filter(s => {
                return getSupplierCategories(s).some(item => item.toLowerCase() === category.toLowerCase());
            });
            const message = affectedSuppliers.length
                ? `Delete "${category}"? ${affectedSuppliers.length} vendor(s) will be moved to "${replacementCategory}".`
                : `Delete "${category}"?`;
            if (!confirm(message)) return;

            try {
                for (const supplier of affectedSuppliers) {
                    let updatedCategories = getSupplierCategories(supplier).filter(item => item.toLowerCase() !== category.toLowerCase());
                    if (updatedCategories.length === 0) updatedCategories = [replacementCategory];
                    await window.api.updateSupplier(supplier.id, {
                        categories: updatedCategories.join(', ')
                    });
                }
            } catch (err) {
                alert('Error: ' + err.message);
                return;
            }

            customCategories = customCategories.filter(item => item.toLowerCase() !== category.toLowerCase());
            if (!deletedCategories.some(item => item.toLowerCase() === category.toLowerCase())) {
                deletedCategories.push(category);
            }
            deletedCategories = deletedCategories.filter(item => item.toLowerCase() !== replacementCategory.toLowerCase());
            saveDeletedCategories();
            localStorage.setItem('supplierCategories', JSON.stringify(customCategories));
            await loadSuppliers();
            renderCategoryManager();
        }
