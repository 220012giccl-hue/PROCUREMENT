<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tender Report - Procurement Assistant</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">

    <style>
        .layout {
            display: flex;
            min-height: 100vh;
            background: var(--bg-light);
        }

        .main-content {
            flex: 1;
            margin-left: 200px;
            margin-top: 64px;
            padding: var(--space-8);
        }

        .page-header {
            margin-bottom: var(--space-8);
        }

        .page-title {
            font-size: var(--text-4xl);
            font-weight: var(--font-bold);
            color: var(--text-primary);
            margin-bottom: var(--space-2);
        }

        .page-subtitle {
            font-size: var(--text-lg);
            color: var(--text-muted);
        }

        .filters {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: var(--space-6);
            margin-bottom: var(--space-6);
            display: flex;
            gap: var(--space-4);
            flex-wrap: wrap;
        }

        .filter-item {
            flex: 1;
            min-width: 200px;
        }

        .action-btn {
            width: fit-content;
            align-self: flex-end;
        }

        .tender-status {
            display: inline-flex;
            align-items: center;
            padding: var(--space-1) var(--space-3);
            font-size: var(--text-xs);
            font-weight: var(--font-medium);
            border-radius: var(--radius-full);
            text-transform: uppercase;
        }

        .status-active { background: #D1FAE5; color: #065F46; }
        .status-pending { background: #FEF3C7; color: #92400E; }
        .status-completed { background: #E0E7FF; color: #3730A3; }
        .status-processing { background: #FEF3C7; color: #92400E; animation: pulse-orange 2s infinite; }
        .status-awaiting_docs { background: #FFEDD5; color: #9A3412; border: 1px solid #FED7AA; }

        @keyframes pulse-orange {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .actions {
            display: flex;
            gap: var(--space-2);
        }

        .btn-icon {
            padding: var(--space-2);
            background: var(--bg-light);
            border: 1px solid var(--border-medium);
            cursor: pointer;
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
        }

        .btn-icon:hover {
            background: var(--bg-dark);
            border-color: var(--primary-orange);
        }

        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .main-content { margin-left: 0; }
        }
    </style>
</head>

<body>
    <!-- Navigation -->
    <nav class="nav">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--primary-orange)" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
                <span>Procurement</span>
            </a>

            <ul class="nav-links">
                <li><a href="index.html" class="nav-link">Dashboard</a></li>
                <li><a href="threads.html" class="nav-link">Threads</a></li>
                <li><a href="tenders.html" class="nav-link active">Report</a></li>
            </ul>

            <div class="flex items-center gap-4">
                <span class="badge badge-success">
                    <span class="status-indicator status-online"></span>
                    Intelligence Online
                </span>
            </div>
        </div>
    </nav>

    <div class="layout">
        <!-- Sidebar -->
                <aside class="sidebar">
            <!-- Sidebar content is unified via js/sidebar.js -->
            <ul class="sidebar-menu">
                <li class="sidebar-item"><a href="index.html" class="sidebar-link">Loading...</a></li>
            </ul>
        </aside>


        <!-- Main Content -->
        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Construction Intelligence Report</h1>
                <p class="page-subtitle">Detailed tracking of all RFQs and Tender Applications</p>
            </div>

            <!-- Filters -->
            <div class="filters">
                <div class="filter-item">
                    <label class="form-label">Search</label>
                    <input type="text" class="form-input" placeholder="Search by Project or ID..." id="searchInput">
                </div>

                <div class="filter-item">
                    <label class="form-label">Client</label>
                    <select class="form-select" id="clientFilter">
                        <option value="">All Clients</option>
                    </select>
                </div>

                <div class="filter-item">
                    <label class="form-label">Status</label>
                    <select class="form-select" id="statusFilter">
                        <option value="">All Status</option>
                        <option value="ACTIVE">Active</option>
                        <option value="PROCESSING">Processing</option>
                        <option value="AWAITING_DOCS">Awaiting Docs</option>
                        <option value="COMPLETED">Completed</option>
                    </select>
                </div>

                <button class="btn btn-primary action-btn" onclick="applyFilters()">
                    Apply Filters
                </button>
            </div>

            <!-- Tenders Table -->
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Tender ID</th>
                            <th>Client</th>
                            <th>Project / Subject</th>
                            <th>Received At</th>
                            <th>Status</th>
                            <th>Intelligence</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tendersTableBody">
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 3rem; color: var(--text-muted);">
                                <div>Loading Tender Intelligence...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- JavaScript -->
    <script src="js/sidebar.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async function() {
            var u = await Auth.checkSession();
            if (!u) { window.location.href = "/"; }
        });
    </script>
    <script src="js/api.js"></script>
    <script>
        let allTenders = [];

        document.addEventListener('DOMContentLoaded', () => {
            if (window.RFQAgentAPIReady) {
                loadTenders();
            } else {
                window.addEventListener('RFQAgentAPIReady', loadTenders);
            }
        });

        async function loadTenders() {
            try {
                const response = await window.RFQAgentAPI.getThreads();
                if (response.success) {
                    allTenders = response.data;
                    populateFilters(allTenders);
                    displayTenders(allTenders);
                }
            } catch (error) {
                console.error('Tenders API error:', error);
            }
        }

        function populateFilters(tenders) {
            const clientFilter = document.getElementById('clientFilter');
            const clients = [...new Set(tenders.map(t => t.contact_name))].sort();
            clients.forEach(client => {
                if (client) {
                    const option = document.createElement('option');
                    option.value = client;
                    option.textContent = client;
                    clientFilter.appendChild(option);
                }
            });
        }

        function applyFilters() {
            const searchTerm = (document.getElementById('searchInput').value || '').toLowerCase();
            const clientTerm = document.getElementById('clientFilter').value;
            const statusTerm = document.getElementById('statusFilter').value;

            const filtered = allTenders.filter(t => {
                const matchesSearch = (t.topic_name || '').toLowerCase().includes(searchTerm) || 
                                     (t.thread_id || '').toLowerCase().includes(searchTerm);
                const matchesClient = !clientTerm || t.contact_name === clientTerm;
                const matchesStatus = !statusTerm || (t.status || '').toUpperCase() === statusTerm.toUpperCase();
                return matchesSearch && matchesClient && matchesStatus;
            });

            displayTenders(filtered);
        }

        function displayTenders(tenders) {
            const tbody = document.getElementById('tendersTableBody');
            if (!tenders || tenders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 3rem;">No tenders found.</td></tr>';
                return;
            }

            tbody.innerHTML = tenders.map(t => {
                const meta = t.meta_data || {};
                const intelLine = meta.location ? `<div style="font-size: 0.7rem; color: var(--primary-orange);">📍 ${meta.location}</div>` : '';
                const deadlineLine = meta.submission_deadline ? `<div style="font-size: 0.7rem; color: #ef4444;">⏰ ${new Date(meta.submission_deadline).toLocaleDateString()}</div>` : '';
                
                return `
                <tr>
                    <td><strong>${t.thread_id}</strong></td>
                    <td>${t.contact_name || 'N/A'}</td>
                    <td>
                        <div style="font-weight: 600;">${t.topic_name || t.subject}</div>
                        <div style="font-size: 0.75rem; color: var(--text-muted);">${t.subject}</div>
                    </td>
                    <td>${new Date(t.created_at).toLocaleDateString()}</td>
                    <td><span class="tender-status status-${(t.status || 'ACTIVE').toLowerCase()}">${t.status || 'Active'}</span></td>
                    <td>
                        ${intelLine}
                        ${deadlineLine}
                    </td>
                    <td>
                        <div class="actions">
                            <button class="btn-icon" onclick="window.location.href='threads.html?id=${t.thread_id}'">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            </button>
                        </div>
                    </td>
                </tr>
            `}).join('');
        }
    </script>
</body>
</html>
