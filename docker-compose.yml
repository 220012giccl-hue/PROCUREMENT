services:
  # Pixtral LLM service (already running)
  pixtral-service:
    image: ollama/ollama:latest
    container_name: pixtral-service
    ports:
      - "11434:11434"
    volumes:
      - ./models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    networks:
      - ai-network

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: rfq-postgres
    environment:
      POSTGRES_USER: rfq_user
      POSTGRES_PASSWORD: rfq_secure_2024
      POSTGRES_DB: tender_system_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - ai-network

  # RFQ Agent API
  rfq-agent-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rfq-agent-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://rfq_user:rfq_secure_2024@postgres:5432/tender_system_db
      - PIXTRAL_URL=http://pixtral-service:11434
      - STORAGE_PATH=/app/storage
    volumes:
      - ./storage:/app/storage
      - .:/app
    depends_on:
      - postgres
      - pixtral-service
    networks:
      - ai-network

volumes:
  postgres_data:


networks:
  ai-network:
    driver: bridge
