<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Procurement Agent — AI Assistant</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: radial-gradient(circle at top right, #1e2a4a, #0a0e1a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .chat-container {
            width: 90%;
            max-width: 900px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .chat-header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 {
            margin: 0;
            color: #fff;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header h2 i {
            color: #4facfe;
        }

        .chat-messages {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .message.assistant {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.08);
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .chat-input-area {
            padding: 25px 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .input-wrapper {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 5px 15px;
            display: flex;
            align-items: center;
            transition: all 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: #4facfe;
            background: rgba(255, 255, 255, 0.08);
        }

        #chat-input {
            flex: 1;
            background: none;
            border: none;
            color: #fff;
            padding: 12px 5px;
            font-size: 1rem;
            outline: none;
        }

        .btn-send {
            background: #4facfe;
            color: #fff;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
        }

        .btn-send:hover {
            transform: scale(1.05);
            background: #00f2fe;
        }

        .btn-send:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            align-self: flex-start;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            color: #888;
            font-style: italic;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="chat-header">
            <h2><i class="fas fa-robot"></i> Procurement Intelligence Agent</h2>
            <div class="header-actions">
                <a href="index.html" style="color: #888; text-decoration: none; font-size: 0.9rem;">
                    <i class="fas fa-times"></i> Close
                </a>
            </div>
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="message assistant">
                Hello! I am your <strong>Procurement Intelligence Agent</strong>. I can help you analyze procurement
                requests, manage vendors, and generate RFQs using our local AI core. How can I assist you today?
            </div>
        </div>

        <div class="typing-indicator" id="typing-indicator">
            AI is thinking...
        </div>

        <form class="chat-input-area" id="chat-form">
            <div class="input-wrapper">
                <input type="text" id="chat-input" placeholder="Ask about procurement, tenders, or vendors..."
                    autocomplete="off">
                <label for="file-upload" style="cursor: pointer; color: #888; margin-left: 10px;">
                    <i class="fas fa-paperclip"></i>
                </label>
                <input type="file" id="file-upload" style="display: none;">
            </div>
            <button type="submit" class="btn-send" id="btn-send">
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </div>

    <script src="js/api.js"></script>
    <script>
        const chatForm = document.getElementById('chat-form');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');
        const typingIndicator = document.getElementById('typing-indicator');
        const btnSend = document.getElementById('btn-send');

        let chatHistory = [];

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = chatInput.value.trim();
            if (!message) return;

            // Add user message to UI
            addMessage(message, 'user');
            chatInput.value = '';

            // Show typing indicator
            typingIndicator.style.display = 'block';
            btnSend.disabled = true;
            chatMessages.scrollTop = chatMessages.scrollHeight;

            try {
                // Call the 3-Layer Architecture API
                const response = await window.RFQAgentAPI.askAssistant(message, null, chatHistory);

                // Add bot message to UI
                addMessage(response, 'assistant');

                // Update history
                chatHistory.push({ role: 'user', content: message });
                chatHistory.push({ role: 'assistant', content: response });

            } catch (error) {
                addMessage("⚠️ error connecting to the AI core. Please ensure the backend and Ollama are running.", 'assistant');
                console.error(error);
            } finally {
                typingIndicator.style.display = 'none';
                btnSend.disabled = false;
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
        });

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
    </script>

</body>

</html>
